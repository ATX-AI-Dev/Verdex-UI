<!doctype html>
<html lang="fr" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion — Verdex</title>
    <!-- Fonts & Primitives CSS -->
    <link rel="stylesheet" href="../../packages/tokens/src/index.css" />
    <!-- CDN GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--vx-bg);
        color: var(--vx-ink);
        overflow-x: hidden;
        position: relative;
      }
      .auth-container {
        width: 100%;
        max-width: 440px;
        padding: 24px;
        z-index: 10;
      }
      .auth-card {
        border: 2px solid var(--vx-line);
        background: var(--vx-paper);
        border-radius: var(--vx-radius-lg);
        box-shadow: var(--vx-shadow);
        overflow: hidden;
      }
      .brand-header {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
        text-align: center;
      }
      .background-elements {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 1;
      }
      .bg-circle {
        position: absolute;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        background: color-mix(in oklab, var(--vx-accent) 4%, transparent);
        filter: blur(80px);
      }
      .bg-circle-1 {
        top: -100px;
        left: -100px;
      }
      .bg-circle-2 {
        bottom: -150px;
        right: -100px;
        background: color-mix(in oklab, var(--vx-info) 4%, transparent);
      }
      .theme-switch-fixed {
        position: fixed;
        top: 24px;
        right: 24px;
        z-index: 999;
      }
    </style>
  </head>
  <body>
    <!-- Background blurred decoratives -->
    <div class="background-elements">
      <div class="bg-circle bg-circle-1" id="bg-c1"></div>
      <div class="bg-circle bg-circle-2" id="bg-c2"></div>
    </div>

    <!-- Floating Theme Switcher -->
    <div class="theme-switch-fixed">
      <button class="vx-btn" onclick="toggleTheme()">◐ Thème</button>
    </div>

    <div class="auth-container">
      <div class="brand-header">
        <svg width="48" height="48" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" id="auth-logo">
          <path d="M20 15L45 75L50 85L55 75L80 15H65L50 60L35 15H20Z" fill="var(--vx-accent)" />
        </svg>
        <div>
          <h2 class="vx-title vx-title--2" style="margin: 0;">Réseau Verdex</h2>
          <span class="vx-eyebrow" style="color: var(--vx-muted);">Console d'Administration</span>
        </div>
      </div>

      <div class="vx-card auth-card" id="form-card">
        <div class="vx-card__cap">
          <span class="vx-card__tag">Connexion requise</span>
        </div>
        <form class="vx-card__body vx-stack" style="gap: 20px;" onsubmit="handleLogin(event)">
          <!-- Email Field -->
          <label class="vx-field">
            <span class="vx-field__label">Identifiant ou Email</span>
            <span class="vx-field__wrap">
              <input class="vx-input" type="text" id="email" placeholder="admin@verdex.io" required value="admin@verdex.io" />
            </span>
          </label>

          <!-- Password Field -->
          <label class="vx-field">
            <span class="vx-field__label">Mot de passe</span>
            <span class="vx-field__wrap">
              <input class="vx-input" type="password" id="password" placeholder="••••••••" required value="devstack2026" />
            </span>
            <span class="vx-field__hint">Sécurisé par hash local.</span>
          </label>

          <!-- Option Checkboxes -->
          <div class="vx-row" style="justify-content: space-between; align-items: center; font-size: 13px;">
            <label class="vx-row" style="gap: 8px; cursor: pointer; align-items: center;">
              <input type="checkbox" checked style="accent-color: var(--vx-accent);" />
              <span>Rester connecté</span>
            </label>
            <a href="#" class="vx-link">Oublié ?</a>
          </div>

          <!-- Submit Button -->
          <div class="vx-stack" style="margin-top: 8px;">
            <button type="submit" class="vx-btn vx-btn--primary" id="submit-btn" style="justify-content: center; width: 100%;">
              Se connecter au cluster
            </button>
            <a href="dashboard_template.html" class="vx-btn vx-btn--ghost" style="justify-content: center; width: 100%;">
              Accéder en Démo (Invité)
            </a>
          </div>
        </form>
      </div>

      <p class="vx-text vx-text--xs vx-text--muted" style="text-align: center; margin-top: 24px;">
        Accès restreint. Les connexions sont journalisées dans PostgreSQL.
      </p>
    </div>

    <script>
      function toggleTheme() {
        const el = document.documentElement;
        el.dataset.theme = el.dataset.theme === 'light' ? 'dark' : 'light';
        gsap.fromTo("body", { opacity: 0.8 }, { opacity: 1, duration: 0.4, ease: "power2.out" });
      }

      function handleLogin(e) {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.textContent = "Authentification...";

        // Petit effet d'attente GSAP puis redirection
        gsap.to("#form-card", {
          x: 10,
          yoyo: true,
          repeat: 5,
          duration: 0.05,
          onComplete: () => {
            gsap.to("#form-card", {
              scale: 0.9,
              opacity: 0,
              duration: 0.3,
              ease: "power2.in",
              onComplete: () => {
                window.location.href = "dashboard_template.html";
              }
            });
          }
        });
      }

      // Initial Animations
      window.addEventListener('DOMContentLoaded', () => {
        gsap.from("#auth-logo", {
          scale: 0,
          rotation: -180,
          opacity: 0,
          duration: 0.8,
          ease: "back.out(1.7)"
        });

        gsap.from("#form-card", {
          y: 60,
          opacity: 0,
          duration: 0.8,
          delay: 0.2,
          ease: "power3.out"
        });

        // Parallax mouse effect on blurred circles in background
        document.addEventListener('mousemove', (e) => {
          const x = (e.clientX - window.innerWidth / 2) / 20;
          const y = (e.clientY - window.innerHeight / 2) / 20;
          
          gsap.to("#bg-c1", { x: x, y: y, duration: 1.2, ease: "power2.out" });
          gsap.to("#bg-c2", { x: -x, y: -y, duration: 1.2, ease: "power2.out" });
        });
      });
    </script>
  </body>
</html>
